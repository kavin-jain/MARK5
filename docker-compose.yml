version: '3.8'

services:
  inference-service:
    build:
      context: .
      dockerfile: Dockerfile.inference
    ports:
      - "50051:50051"
    environment:
      - GRPC_PORT=50051
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    restart: always

  redis:
    image: redis:alpine
    container_name: mark3_redis
    command: redis-server --appendonly yes --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    restart: always
    sysctls:
      - net.core.somaxconn=512
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=password
