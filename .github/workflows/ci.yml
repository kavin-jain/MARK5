name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --ignore=tests/test_trades.py \
            --ignore=tests/test_universe_optimizer.py \
            --ignore=tests/test_markrapid.py \
            --ignore=tests/test_markrapid_v2.py \
            --ignore=tests/test_security_hardening.py \
            --ignore=tests/integration \
            --deselect=tests/test_strategies_v2.py::TestUniverseExpander::test_expander_with_real_models \
            --cov=core \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short \
            -q

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
