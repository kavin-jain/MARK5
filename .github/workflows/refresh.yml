name: Refresh live performance

# The research backtest is historical and does not change day to day; only the
# live paper book does, and that needs just ~22 quotes. So this job is small and
# fast rather than re-running the whole pipeline.
on:
  schedule:
    - cron: "30 11 * * 1-5"      # 17:00 IST, after the 15:30 NSE close
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pandas numpy yfinance pyarrow

      - name: Mark the paper book to market
        run: |
          python scripts/paper_track.py status
          python scripts/paper_track.py export

      - name: Merge live data into the dashboard feed
        run: |
          python - <<'PY'
          import json, datetime
          doc  = json.load(open("docs/data/mark6.json"))
          live = json.load(open("data/paper/paper_export.json"))
          doc["live"] = live
          doc["generated"] = datetime.datetime.now(datetime.timezone.utc).astimezone().isoformat(timespec="seconds")
          json.dump(doc, open("docs/data/mark6.json", "w"), indent=1, default=float)
          print(f"live day {live['days_live']}  NAV {live['nav']:.0f}  {live['return_pct']:+.2f}%")
          PY

      - name: Commit if anything moved
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/mark6.json data/paper/
          git diff --staged --quiet || git commit -m "chore: daily live refresh [skip ci]"
          git push
